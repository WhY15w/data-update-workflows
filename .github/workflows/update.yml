name: 数据仓库更新流水线

on:
  schedule:
    - cron: "0,30 * * * *"

  workflow_dispatch:
    inputs:
      force-update-assets:
        type: boolean
        description: "force-update-assets"
        required: false
        default: false
      force-update-config:
        type: boolean
        description: "force-update-config"
        required: false
        default: false
env:
  UNITY_ASSETS_REPO: "SeerAPI/seer-unity-assets"
  CONFIG_SOURCE_REPO: "SeerAPI/config-sources"
  TQDM_MININTERVAL: 5

permissions:
  contents: write

jobs:
  update-unity-assets:
    runs-on: ubuntu-latest
    outputs:
      has_update: ${{ steps.update.outputs.has_update }}

    steps:
      - name: 检出脚本仓库
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: ./.github/actions/setup-environment
        with:
          python-version: "3.10"
          install-dependencies: "true"

      - name: 检查更新
        id: check-update
        run: |
          echo "🚀 开始检查更新..."
          uv run check-seer-assets ${{ env.UNITY_ASSETS_REPO }} main
          echo "✅ 检查更新完成"

      - name: 检出仓库
        id: checkout-repo
        uses: ./.github/actions/checkout-repo
        if: ${{ steps.check-update.outputs.need_update == 'true' || inputs.force-update-assets }}
        with:
          ssh-key: ${{ secrets.SSH_PRIVATE_KEY }}
          repository: ${{ env.UNITY_ASSETS_REPO }}
          path: "seer-unity-assets"
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: 更新 seer-unity-assets
        id: update
        working-directory: ${{ steps.checkout-repo.outputs.repo-path }}
        if: ${{ steps.check-update.outputs.need_update == 'true' || inputs.force-update-assets }}
        run: |
          echo "🚀 开始处理数据..."
          uv run update-seer-assets ${{ inputs.force-update-assets && '--force' || '' }}
          echo "✅ 数据处理完成"

  update-config-sources:
    runs-on: ubuntu-latest
    needs: update-unity-assets
    if: ${{ needs.update-unity-assets.outputs.has_update == 'true' || inputs.force-update-config }}

    steps:
      - name: 检出脚本仓库
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: ./.github/actions/setup-environment
        with:
          python-version: "3.10"
          install-dependencies: "true"

      - name: 检出仓库
        id: checkout-repo
        uses: ./.github/actions/checkout-repo
        with:
          # ssh-key: ${{ secrets.SSH_PRIVATE_KEY }}
          repository: ${{ env.CONFIG_SOURCE_REPO }}
          path: "config-sources"
          token: ${{ secrets.PAT }}
          fetch-depth: 1

      - name: 运行数据处理
        id: update
        working-directory: ${{ steps.checkout-repo.outputs.repo-path }}
        run: |
          echo "🚀 开始处理数据..."
          uv run update-config-sources
          echo "✅ 数据处理完成"

      - name: Repository Dispatch
        uses: peter-evans/repository-dispatch@v4
        if: steps.update.outputs.has_update == 'true'
        with:
          token: ${{ secrets.PAT }}
          repository: seerapi/api-data
          event-type: config-source-update
