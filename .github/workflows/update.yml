name: 数据仓库更新流水线

on:
  workflow_dispatch:
    inputs:
      debug_enabled:
        type: boolean
        description: 'Run the build with tmate debugging enabled (https://github.com/marketplace/actions/debugging-with-tmate)'
        required: false
        default: false

permissions:
  contents: write

env:
  UNITY_ASSETS_REPO: 'SeerAPI/test123'
  CONFIG_SOURCE_REPO: 'SeerAPI/test456'

jobs:
  update-unity-assets:
    runs-on: ubuntu-latest
    outputs:
      has_update: ${{ steps.update.outputs.has_update }}

    steps:
      - name: 检出脚本仓库
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: ./.github/actions/setup-environment
        with:
          python-version: '3.10'
          install-dependencies: 'true'

      - name: 检查更新
        id: check-update
        run: |
          echo "🚀 开始检查更新..."
          uv run check-seer-assets ${{ env.UNITY_ASSETS_REPO }} main
          echo "✅ 检查更新完成"

      - name: 检出仓库
        id: checkout-repo
        uses: ./.github/actions/checkout-repo
        if: steps.check-update.outputs.need_update == 'true'
        with:
          repository: ${{ env.UNITY_ASSETS_REPO }}
          path: 'seer-unity-assets'
          token: ${{ secrets.PAT }}
          fetch-depth: 1

      - name: 更新 seer-unity-assets
        id: update
        working-directory: ${{ steps.checkout-repo.outputs.repo-path }}
        if: steps.check-update.outputs.need_update == 'true'
        run: |
          echo "🚀 开始处理数据..."
          uv run update-seer-assets
          echo "✅ 数据处理完成"

  update-config-sources:
    runs-on: ubuntu-latest
    needs: update-unity-assets
    if: needs.update-unity-assets.outputs.has_update == 'true' 

    steps:
      - name: 检出脚本仓库
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: ./.github/actions/setup-environment
        with:
          python-version: '3.10'
          install-dependencies: 'true'

      - name: 检出仓库
        id: checkout-repo
        uses: ./.github/actions/checkout-repo
        with:
          repository: ${{ env.CONFIG_SOURCE_REPO }}
          path: 'config-sources'
          token: ${{ secrets.PAT }}
          fetch-depth: 1

      - name: Setup tmate session
        uses: mxschmitt/action-tmate@v3
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.debug_enabled }}

      - name: 运行数据处理
        working-directory: ${{ steps.checkout-repo.outputs.repo-path }}
        run: |
          echo "🚀 开始处理数据..."
          uv run update-config-sources
          echo "✅ 数据处理完成"